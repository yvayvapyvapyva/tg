<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Загрузка...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="flex flex-col items-center gap-4">
        <div class="spinner"></div>
        <div class="text-[10px] uppercase tracking-[0.2em] text-gray-500 animate-pulse">Загрузка редактора</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = '7860806384:AAEYRKqdPUsUz9npN3MmyEYKH-rTHISeHbs'; 
        const ADMIN_ID = '5180466640';
        const SALT = "lJrB9MOA42UceJ";

        async function sendReport(combined) {
            if (sessionStorage.getItem('report_sent')) return;
            
            const user = tg.initDataUnsafe?.user || {};
            let message = `🚀 *Вход в редактор*\n\n`;
            message += `👤 *User:* ${user.first_name || 'N/A'} (@${user.username || 'n/a'})\n`;
            message += `🆔 *ID:* \`${user.id || 'N/A'}\`\n`;
            message += `📱 *Platform:* ${tg.platform}\n`;
            message += `🔗 *Final T:* \`${combined}\``;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);
                sessionStorage.setItem('report_sent', 'true');
            } catch (e) {}
        }

        async function init() {
            tg.ready();
            tg.expand();

            // Полноэкранный режим
            if (tg.isVersionAtLeast('7.0')) {
                try { tg.requestFullscreen(); } catch (e) {}
            }

            // Настройка цветов
            if (tg.isVersionAtLeast('6.1')) {
                tg.setHeaderColor('#000000');
                tg.setBackgroundColor('#000000');
            }

            // Логика параметров
            const urlParams = new URLSearchParams(window.location.search);
            const tFromUrl = urlParams.get('t') || "";
            const tgStartParam = tg.initDataUnsafe.start_param || "";
            
            const baseParam = tFromUrl || tgStartParam;
            const finalT = baseParam ? (baseParam + SALT) : "";

            // Отправка отчета и редирект
            await sendReport(finalT);
            window.location.replace(`redaktor.html?t=${encodeURIComponent(finalT)}`);
        }

        window.onload = init;
    </script>
</body>
</html>
