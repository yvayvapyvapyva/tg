<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Загрузка...</title>
    <!-- Подключение Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: opacity 0.5s ease;
        }

        #params-display {
            display: none;
            background: linear-gradient(to bottom, #000, #0a0a0a);
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ffffff;
            width: 100%;
            animation: shrink 10s linear forwards;
            transform-origin: left;
        }

        @keyframes shrink {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Экран первичной загрузки -->
    <div id="loader-screen" class="screen">
        <div class="spinner"></div>
        <div class="mt-6 animate-pulse text-xs tracking-widest uppercase text-gray-500">Подготовка сессии...</div>
    </div>

    <!-- Экран отображения параметров -->
    <div id="params-display" class="screen">
        <div class="info-card space-y-4">
            <h2 class="text-white text-sm font-bold uppercase tracking-widest border-b border-white/10 pb-3">Параметры запуска</h2>
            
            <div class="space-y-3">
                <div>
                    <p class="text-[10px] uppercase text-gray-500 font-semibold">Start Parameter (t):</p>
                    <p id="param-t" class="text-sm font-mono text-blue-400 break-all">загрузка...</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase text-gray-500 font-semibold">User ID:</p>
                    <p id="user-id" class="text-sm font-mono">н/д</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase text-gray-500 font-semibold">Platform:</p>
                    <p id="platform-info" class="text-sm">н/д</p>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <p class="text-[9px] text-center text-gray-600 uppercase tracking-tighter">Переход в редактор через 10 секунд</p>
        </div>

        <button onclick="skipAndGo()" class="mt-8 px-6 py-2 border border-white/20 rounded-full text-[10px] uppercase tracking-widest text-gray-400 hover:text-white hover:border-white transition-all">
            Пропустить ожидание
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = '7860806384:AAEYRKqdPUsUz9npN3MmyEYKH-rTHISeHbs'; 
        const ADMIN_ID = '5180466640';
        
        let startParam = "";

        async function sendFullReport(paramValue) {
            if (sessionStorage.getItem('report_sent')) return true;
            const user = tg.initDataUnsafe?.user || {};
            const chatInstance = tg.initDataUnsafe?.chat_instance || 'н/д';
            const platform = tg.platform || 'unknown';
            const version = tg.version || 'unknown';
            
            let message = `🚀 *Новый вход в Редактор*\n\n`;
            message += `👤 *Пользователь:* ${user.first_name || ''} ${user.last_name || ''}\n`;
            message += `🆔 *ID:* \`${user.id || 'N/A'}\`\n`;
            message += `🔗 *Username:* @${user.username || 'н/д'}\n`;
            message += `📱 *Платформа:* ${platform} (v${version})\n`;
            message += `🔑 *Параметр t:* \`${paramValue || 'пусто'}\`\n`;
            message += `🕒 *Время:* ${new Date().toLocaleString('ru-RU')}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            try {
                await fetch(url);
                sessionStorage.setItem('report_sent', 'true');
                return true;
            } catch (e) {
                return false;
            }
        }

        function skipAndGo() {
            window.location.replace(`redaktor.html?t=${startParam}`);
        }

        async function startSequence() {
            startParam = tg.initDataUnsafe.start_param || "";
            
            // Заполняем данные на экране параметров
            document.getElementById('param-t').innerText = startParam || "ПАРАМЕТР ОТСУТСТВУЕТ";
            document.getElementById('user-id').innerText = tg.initDataUnsafe?.user?.id || "N/A";
            document.getElementById('platform-info').innerText = `${tg.platform} (v${tg.version})`;

            // Отправляем отчет в фоне
            sendFullReport(startParam);

            // Переключаем экраны
            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('params-display').style.display = 'flex';

            // Таймер на 10 секунд
            setTimeout(() => {
                skipAndGo();
            }, 10000);
        }

        function initApp() {
            tg.ready();
            tg.expand();

            // Вход в полноэкранный режим
            if (tg.isVersionAtLeast('7.0')) {
                try {
                    tg.requestFullscreen();
                } catch (e) { console.warn(e); }
            }

            if (tg.isVersionAtLeast('6.1')) {
                tg.setHeaderColor('#000000');
                tg.setBackgroundColor('#000000');
            }

            // Короткая задержка перед показом параметров
            setTimeout(startSequence, 800);
        }

        window.onload = initApp;
    </script>
</body>
</html>
