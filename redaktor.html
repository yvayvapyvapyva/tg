<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Route Editor Pro | Cloud Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=YANDEX_API_KEY&lang=ru_RU&suppressMapOpenBlock=true"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --btn: #007AFF; 
            --text: #1d1d1f; 
            --danger: #FF3B30; 
            --success: #34C759; 
            --radius: 24px; 
            --border: rgba(0,0,0,0.08); 
            --bg-secondary: #f5f5f7;
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background: #fff; -webkit-tap-highlight-color: transparent; color: var(--text); }
        #map { position: absolute; inset: 0; z-index: 1; }
        [class*="-copyrights-pane"], [class*="-controls-pane"] { display: none !important; }
        
        #welcomeScreen { position: fixed; inset: 0; z-index: 5000; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .welcome-card { background: #fff; width: 100%; max-width: 400px; padding: 32px; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); text-align: center; }
        
        .top-controls { 
            position: absolute; 
            top: calc(env(safe-area-inset-top) + 45px); 
            left: 20px; 
            right: 20px; 
            z-index: 2000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            pointer-events: none; 
        }
        .btn-top { background: rgba(255, 255, 255, 0.9); color: var(--text); padding: 10px 16px; border-radius: 25px; font-weight: 600; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; backdrop-filter: blur(20px); pointer-events: auto; transition: 0.2s; }
        .btn-top:active { transform: scale(0.96); background: #fff; }

        .bottom-center-controls { position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 2000; display: none; flex-direction: column; align-items: center; width: auto; max-width: 90%; }
        
        .btn-add-main { 
            background: var(--btn); color: #fff; padding: 18px 32px; border-radius: 35px; font-weight: 700; border: none; box-shadow: 0 10px 30px rgba(0,122,255,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: max-content; max-width: 100%; white-space: nowrap; 
        }
        .btn-add-main.active, .btn-add-main.drawing { background: var(--btn); padding: 16px 24px; font-size: 14px; white-space: normal; text-align: center; }
        
        .modal { position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.3); display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg-secondary); width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; max-height: 90vh; animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1); position: relative; padding-bottom: env(safe-area-inset-bottom); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .btn-action { background: var(--btn); color: #fff; border: none; border-radius: 16px; padding: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; width: 100%; font-size: 16px; }
        .btn-action.loading { background: #e5e5ea !important; color: #8e8e93 !important; pointer-events: none; opacity: 0.7; }
        .btn-action.saved { background: var(--success) !important; }
        
        .editor-section { padding: 0 20px 20px 20px; overflow-y: auto; }
        .settings-group { background: #fff; border-radius: 20px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border); }
        .settings-item { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .settings-item:last-child { border-bottom: none; }
        .settings-item:active { background: #f2f2f7; }

        input, textarea, select { width: 100%; padding: 14px; border: none; font-size: 16px; outline: none; background: transparent; font-family: inherit; color: var(--text); }
        .input-wrapper { background: #fff; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; align-items: center; padding-right: 8px; }

        .gist-list { max-height: 250px; overflow-y: auto; }
        .gist-item { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 500; }
        .gist-item:last-child { border-bottom: none; }
        .gist-item.active { color: var(--btn); background: #f0f7ff; }

        .color-dropdown { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 30px; padding: 12px; display: none; flex-direction: column; gap: 4px; z-index: 6000; box-shadow: 0 30px 100px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        .dropdown-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 5999; display: none; backdrop-filter: blur(4px); }
        .color-row { display: flex; align-items: center; gap: 16px; padding: 14px; border-radius: 18px; cursor: pointer; transition: 0.2s; }
        .color-row:active { background: #f2f2f7; }
        .swatch { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
        
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { margin: 0; font-size: 20px; font-weight: 700; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .close-circle { width: 32px; height: 32px; border-radius: 50%; background: #e5e5ea; border: none; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: #8e8e93; flex-shrink: 0; }

        #toast { position: fixed; top: calc(env(safe-area-inset-top) + 10px); left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 9999; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); opacity: 0; backdrop-filter: blur(10px); }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .sortable-point-item { background: #fff; padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .sort-handle { position: absolute; top: 12px; right: 12px; color: #d1d1d6; cursor: grab; font-size: 20px; padding: 4px; }
        
        .item-main-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-right: 35px; }
        .point-number-text { font-size: 18px; font-weight: 800; color: var(--btn); min-width: 24px; text-align: center; }
        .color-indicator-btn { width: 36px; height: 36px; border-radius: 50% !important; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-shrink: 0; }
        .btn-item-action { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--bg-secondary); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--text); }
        .item-actions { display: flex; gap: 8px; margin-top: 12px; }
        .section-title { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; margin: 0 0 8px 16px; letter-spacing: 0.5px; }
        select.cmd-select { white-space: normal; height: auto; min-height: 48px; line-height: 1.3; appearance: none; background: var(--bg-secondary); border-radius: 12px; padding: 10px 12px; border: 1px solid transparent; font-weight: 500; }
        .comm-input { background: #fafafa; border: 1px solid var(--border); border-radius: 12px; margin-top: 8px; padding: 12px; font-size: 14px; resize: none; transition: 0.2s; }
        .comm-input:focus { border-color: var(--btn); background: #fff; }
    </style>
</head>
<body>

<div id="toast">Готово</div>

<div id="welcomeScreen">
    <div class="welcome-card">
        <h2 style="margin:0 0 8px 0; font-weight: 800;">Route Editor</h2>
        <div id="userIdBadge" style="background:#f2f2f7; color:#8e8e93; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; margin-bottom:24px">Загрузка...</div>
        <div class="input-wrapper"><input type="password" id="ghTokenInput" placeholder="GitHub Token"></div>
        <button id="authBtn" class="btn-action" onclick="handleAuthClick()">Войти</button>
    </div>
</div>

<div id="map"></div>

<div class="top-controls" id="uiControls" style="display:none">
    <button id="listPointsBtn" class="btn-top" onclick="openPointsOrderModal()" style="visibility:hidden">
        <span>📋</span> <span id="routeLabelText">Маршрут</span>
    </button>
    <button class="btn-top" onclick="openSettingsModal()">
        <span>⚙️</span>
    </button>
</div>

<div class="bottom-center-controls" id="bottomControls">
    <button id="addMarkerBtn" class="btn-add-main" onclick="handleAddBtnClick()" style="visibility:hidden">
        <span id="addText">Добавить новую точку</span>
    </button>
</div>

<div id="dropdownOverlay" class="dropdown-overlay" onclick="closeD()"></div>
<div id="listColorDropdown" class="color-dropdown"></div>

<div id="pointsOrderModal" class="modal" onclick="if(event.target===this) toggleM('pointsOrderModal')">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="orderModalTitle">Маршрут</h3>
            <button class="close-circle" onclick="toggleM('pointsOrderModal')">✕</button>
        </div>
        <div class="editor-section" id="pointsSortList"></div>
        <div style="padding: 20px;">
            <button id="saveInListBtn" class="btn-action" style="background: var(--success);" onclick="handleModalSave()">
                <span id="saveBtnText">Сохранить в облаке</span>
            </button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal" onclick="if(event.target===this) toggleM('settingsModal')">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Настройки</h3>
            <button class="close-circle" onclick="toggleM('settingsModal')">✕</button>
        </div>
        <div class="editor-section">
            <span class="section-title">Новый маршрут</span>
            <div class="input-wrapper">
                <input type="text" id="newRouteName" placeholder="Название (A-Z, 0-9)" oninput="this.value = this.value.replace(/[^a-zA-Z0-9_-]/g, '')">
                <button id="btnCreateFile" style="background:var(--btn); color:#fff; border:none; padding:8px 16px; border-radius:12px; font-weight:700; margin-right:4px;" onclick="handleCreateNew()">Создать</button>
            </div>
            
            <span class="section-title">Список файлов</span>
            <div class="settings-group gist-list" id="settingsGistList"></div>
            
            <div id="fileActions" style="display:none; margin-top:10px;">
                <span class="section-title" id="activeFileNameDisplay">Управление файлом</span>
                <div class="settings-group">
                    <div class="settings-item" onclick="shareActiveRoute()">
                        <span style="font-weight: 500;">🔗 Скопировать ссылку</span>
                        <span style="color:var(--btn); font-size: 20px;">›</span>
                    </div>
                    <div class="settings-item" onclick="deleteActiveRoute()">
                        <span style="font-weight: 500; color: var(--danger);">🗑️ Удалить маршрут</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
const f6 = n => Math.round(n * 1e6) / 1e6;
const tg = window.Telegram.WebApp;
const tgUser = tg.initDataUnsafe?.user;
const USER_ID = tgUser ? tgUser.id : "guest_" + Math.random().toString(36).substr(2, 5);
const USER_NAME = tgUser ? (tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : "")) : "Guest";
const USER_UNAME = tgUser?.username ? `@${tgUser.username}` : "";
const GIST_DESCRIPTION = `[${USER_ID}] User: ${USER_NAME} ${USER_UNAME}`;

// Временная переменная для токена (только в ОЗУ)
let SESSION_TOKEN = null;

const COLORS = { 
    Gold: { hex: '#FFD700', label: 'Маневры на перекрестке' }, 
    Blue: { hex: '#007AFF', label: 'Разворот вне перекрестка' }, 
    Red: { hex: '#FF3B30', label: 'Разгон до максимальной скорости' }, 
    Fuchsia: { hex: '#AF52DE', label: 'Остановка и начало движения на подъем' }, 
    Orange: { hex: '#FF9500', label: 'Левые и правые повороты' }, 
    Purple: { hex: '#5856D6', label: 'Параллельная парковка и гараж' }, 
    Cyan: { hex: '#5AC8FA', label: 'Разворот в ограниченном пространстве' }, 
    Brown: { hex: '#A2845E', label: 'Остановка' },
    Lime: { hex: '#34C759', label: 'Начало движения' }
};

const COMMAND_SETS = {
    Gold: ["На перекрестке повернем налево", "На перекрестке едем прямо", "На перекрестке повернем направо", "На перекрестке выполним разворот", "На круговом движении первый съезд", "На круговом движении второй съезд", "На круговом движении третий съезд", "На круговом движении четвертый съезд"],
    Blue: ["Выполним разворот вне перекрестка", "Выполним разворот в ближайшем разрешенном месте", "Найдите место для разворота и развернитесь"],
    Red: ["Выполняем разгон до максимальной скорости", "Набираем максимальную скорость на данном участке дороги", "Разгоняемся до максимальной разрешенной скорости"],
    Fuchsia: ["По моей команде выполним остановку и начало движения на подъеме", "Выполняем остановку и начало движения на подъеме"],
    Orange: ["Поворачиваем направо", "Поворачиваем налево", "Далее повернем направо", "Далее повернем налево", "На светофоре повернем направо", "На светофоре повернем налево", "Поворачиваем направо к ленте", "Поворачиваем направо на заправку", "Едем в прямом направлении"],
    Purple: ["Выполняем параллельную парковку и гараж"],
    Cyan: ["Выполняем разворот в ограниченном пространстве", "Выполним разворот в ограниченном пространстве с использованием передачи заднего хода"],
    Brown: ["Выполняем остановку параллельно краю проезжей части", "Выполняем остановку в ближайшем разрешенном месте"],
    Lime: ["Начинаем движение", "Как будете готовы начинаем движение"]
};

let map, points = [], cur = null, isAdd = false, isDrawing = false, curFile = null, userGistId = null, activeListPoint = null;
let userLocPlacemark = null;

const showToast = (t) => { const el = $('toast'); el.textContent = t; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); };

const getSvg = (col, txt, az, isEnd) => {
    const s = isEnd ? 34 : 40, c = s/2;
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><g transform="rotate(${az},${c},${c})"><polygon points="${c},2 ${s*0.75},${s-5} ${c},${s*0.65} ${s*0.25},${s-5}" fill="${col}" stroke="#000" stroke-width="1.5"/></g><circle cx="${c}" cy="${c}" r="${isEnd?7:9}" fill="${col}" stroke="#000" stroke-width="1"/><text x="${c}" y="${c+3}" font-size="10" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#000" stroke="#fff" stroke-width="2.5" style="paint-order:stroke fill">${txt}</text></svg>`);
};

const getUserLocSvg = () => 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#007AFF" stroke="white" stroke-width="3" /><circle cx="12" cy="12" r="11" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.3" /></svg>`);

const calcA = (p1, p2) => { if(!p1 || !p2) return 0; return Math.round((Math.atan2(Math.cos(Math.PI/180*p1[0])*(p2[1]-p1[1]), p2[0]-p1[0])*180/Math.PI+360)%360); };

const api = async (u, m = 'GET', b = null) => {
    if(!SESSION_TOKEN) return null;
    const h = { Authorization: `token ${SESSION_TOKEN}`, 'Content-Type': 'application/json' };
    try { 
        const r = await fetch(u, { method: m, headers: h, body: b ? JSON.stringify(b) : null }); 
        if (r.status === 401) { SESSION_TOKEN = null; location.reload(); return null; }
        return r.ok ? (r.status !== 204 ? r.json() : true) : null; 
    } catch(e) { return null; }
};

ymaps.ready(() => {
    tg.expand();
    $('userIdBadge').textContent = `ID: ${USER_ID}`;
    map = new ymaps.Map("map", { center: [56.3399, 43.9332], zoom: 17, type: 'yandex#satellite', controls: [] });
    
    userLocPlacemark = new ymaps.Placemark([0,0], {}, {
        iconLayout: 'default#image', iconImageHref: getUserLocSvg(), iconImageSize: [24, 24], iconImageOffset: [-12, -12], zIndex: 5000, visible: false
    });
    map.geoObjects.add(userLocPlacemark);
    initGeolocation();

    map.events.add('click', e => { if(isAdd) { const p = addP(e.get('coords'), { color: 'Gold' }); startDrawingForPoint(p); } });
    
    initColorDropdown('listColorDropdown', (h, n) => {
        if(activeListPoint) {
            const { point: p, card: c } = activeListPoint; 
            p.color = n;
            c.querySelector('.color-indicator-btn').style.background = h;
            const sel = c.querySelector('.cmd-select');
            updateCommandOptions(sel, n, "");
            p.cmd = sel.value; 
            if (p.line) { p.line.options.set('strokeColor', h); updI(p); if(p.pmEnd) updPI(p); }
            activeListPoint = null;
        }
    });
    
    new Sortable($('pointsSortList'), { animation: 150, handle: '.sort-handle', onEnd: reorderPointsFromList });

    // Пытаемся взять токен из параметров запуска Telegram
    const startParam = tg.initDataUnsafe?.start_param;
    if (startParam && startParam.length > 20) {
        SESSION_TOKEN = startParam;
        handleAuthClick();
    }
});

const handleAuthClick = async () => {
    const inputToken = $('ghTokenInput').value.trim();
    if (!SESSION_TOKEN) SESSION_TOKEN = inputToken;
    
    if(!SESSION_TOKEN) return;

    const btn = $('authBtn');
    btn.disabled = true;
    btn.textContent = "Проверка...";

    if(await ensureUserGist()) {
        $('welcomeScreen').style.display = 'none';
        $('uiControls').style.display = 'flex';
        $('bottomControls').style.display = 'flex';
        refreshFileList();
    } else { 
        SESSION_TOKEN = null;
        btn.disabled = false;
        btn.textContent = "Войти";
        showToast("Неверный токен"); 
    }
};

const ensureUserGist = async () => {
    if(userGistId) return true;
    const gists = await api(`https://api.github.com/gists?per_page=100&t=${Date.now()}`); 
    if(!gists) return false;
    const ex = gists.find(g => g.description && g.description.includes(`[${USER_ID}]`));
    if(ex) { userGistId = ex.id; return true; }
    const cr = await api('https://api.github.com/gists', 'POST', { description: GIST_DESCRIPTION, public: true, files: { ".init": { content: "Init" } } });
    if(cr) { userGistId = cr.id; return true; }
    return false;
};

const refreshFileList = async () => {
    const cont = $('settingsGistList'); cont.innerHTML = '<div style="padding:20px; text-align:center; color:#8e8e93;">Обновление...</div>';
    const g = await api(`https://api.github.com/gists/${userGistId}?t=${Date.now()}`); if(!g) return;
    cont.innerHTML = '';
    const files = Object.keys(g.files).filter(fn => fn.endsWith('.json'));
    files.forEach(fn => {
        const item = Object.assign(document.createElement('div'), { className: `gist-item ${curFile === fn ? 'active' : ''}`, onclick: () => loadRoute(fn) });
        item.innerHTML = `<span>${fn.replace('.json','')}</span>`;
        cont.appendChild(item);
    });
    updateVisibility();
};

const updateVisibility = () => {
    const isFileActive = curFile !== null;
    $('listPointsBtn').style.visibility = isFileActive ? 'visible' : 'hidden';
    $('addMarkerBtn').style.visibility = isFileActive ? 'visible' : 'hidden';
    if(curFile) {
        const name = curFile.replace('.json','');
        $('fileActions').style.display = 'block';
        $('activeFileNameDisplay').textContent = `Маршрут: ${name}`;
        $('routeLabelText').textContent = name;
    }
};

const loadRoute = async (fn) => {
    const g = await api(`https://api.github.com/gists/${userGistId}?t=${Date.now()}`); if(!g) return;
    const data = JSON.parse(g.files[fn]?.content || "[]");
    points.forEach(p => { map.geoObjects.remove(p.pm); map.geoObjects.remove(p.line); if(p.pmEnd) map.geoObjects.remove(p.pmEnd); });
    points = []; curFile = fn;
    data.forEach(d => addP(d.pts[0], d));
    recalculateIds();
    if(points.length) map.setCenter(points[0].pts[0]);
    updateVisibility();
    showToast(`Загружен: ${fn.replace('.json','')}`);
};

const handleCreateNew = async () => {
    const n = $('newRouteName').value.trim(); if(!n) return;
    const fn = n + '.json';
    const r = await api(`https://api.github.com/gists/${userGistId}`, 'PATCH', { files: { [fn]: { content: "[]" } } });
    if(r) { $('newRouteName').value = ''; refreshFileList(); loadRoute(fn); }
};

const deleteActiveRoute = async () => {
    if(!curFile || !confirm(`Удалить ${curFile}?`)) return;
    if(await api(`https://api.github.com/gists/${userGistId}`, 'PATCH', { files: { [curFile]: null } })) {
        points.forEach(p => { map.geoObjects.remove(p.pm); map.geoObjects.remove(p.line); if(p.pmEnd) map.geoObjects.remove(p.pmEnd); });
        points = []; curFile = null; refreshFileList();
    }
};

const shareActiveRoute = () => {
    if(!curFile) return;
    const link = `t.me/e_ia_bot/nav?startapp=${SESSION_TOKEN.substring(0,8)}...`; // Небезопасно передавать весь токен, но по запросу
    showToast("Функция обмена ограничена безопасностью токена");
};

const initGeolocation = () => {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(p => {
        const c = [p.coords.latitude, p.coords.longitude];
        userLocPlacemark.geometry.setCoordinates(c);
        userLocPlacemark.options.set('visible', true);
    }, null, { enableHighAccuracy: true });
};

const toggleM = id => { const m = $(id); m.style.display = (m.style.display === 'none' || !m.style.display) ? 'flex' : 'none'; };
const closeD = () => { document.querySelectorAll('.color-dropdown').forEach(dr => dr.style.display = 'none'); $('dropdownOverlay').style.display = 'none'; };
const toggleD = id => { const d = $(id), vis = d.style.display === 'flex'; closeD(); if(!vis) { d.style.display = 'flex'; $('dropdownOverlay').style.display = 'block'; } };

const initColorDropdown = (id, cb) => {
    const dr = $(id);
    Object.entries(COLORS).forEach(([n, d]) => {
        const r = Object.assign(document.createElement('div'), { className: 'color-row', onclick: (e) => { e.stopPropagation(); cb(d.hex, n); closeD(); } });
        r.innerHTML = `<div class="swatch" style="background:${d.hex}"></div><div style="font-weight:600;">${d.label}</div>`;
        dr.appendChild(r);
    });
};

const updateCommandOptions = (select, colorName, currentValue = "") => {
    select.innerHTML = '';
    (COMMAND_SETS[colorName] || ["Без команды"]).forEach(cmd => {
        const opt = document.createElement('option'); opt.value = cmd; opt.textContent = cmd;
        if(cmd === currentValue) opt.selected = true;
        select.appendChild(opt);
    });
};

function addP(coords, data = null) {
    const p = { 
        id: data?.id || (points.length + 1), color: data?.color || 'Gold', cmd: data?.cmd || '', comm: data?.comm || '', pts: data?.pts || [coords],
        pm: new ymaps.Placemark(coords, {}, { iconLayout: 'default#imageWithContent', iconImageSize: [40,40], iconImageOffset: [-20,-20], zIndex: 1000 }),
        line: new ymaps.Polyline(data?.pts || [coords], {}, { strokeWidth: 5, strokeOpacity: 0.8, zIndex: 500 }), pmEnd: null
    };
    p.line.options.set('strokeColor', COLORS[p.color].hex);
    p.pm.geometry.events.add('change', () => { 
        const pts = p.line.geometry.getCoordinates(); 
        if(pts.length) { pts[0] = p.pm.geometry.getCoordinates(); p.line.geometry.setCoordinates(pts); } 
    });
    p.line.geometry.events.add('change', () => { 
        p.pts = p.line.geometry.getCoordinates().map(pt => [f6(pt[0]), f6(pt[1])]); 
        updI(p); if (p.pts.length > 1) updPI(p); 
    });
    p.pm.events.add('click', () => { if(!isAdd && !isDrawing) openEditPointModal(p); });
    map.geoObjects.add(p.pm); map.geoObjects.add(p.line);
    points.push(p); updI(p); if (p.pts.length > 1) updPI(p);
    return p;
}

const startDrawingForPoint = p => { isAdd = false; isDrawing = true; $('addText').textContent = "Завершить путь"; $('addMarkerBtn').classList.add('drawing'); cur = p; p.line.editor.startDrawing(); };
const stopDrawingMode = () => { if (cur) { cur.pm.options.set('draggable', false); cur.line.editor.stopEditing(); } isDrawing = false; $('addText').textContent = "Добавить новую точку"; $('addMarkerBtn').classList.remove('drawing'); cur = null; };
const handleAddBtnClick = () => { if(isDrawing) stopDrawingMode(); else if(isAdd) stopAdd(); else startAdd(); };
const startAdd = () => { isAdd = true; $('addText').textContent = "Нажмите на карту..."; $('addMarkerBtn').classList.add('active'); map.setCursor('crosshair'); };
const stopAdd = () => { isAdd = false; $('addText').textContent = "Добавить новую точку"; $('addMarkerBtn').classList.remove('active'); map.setCursor('grab'); };

const updI = p => { 
    let az = (p.pts && p.pts.length >= 2) ? calcA(p.pts[0], p.pts[1]) : 0; 
    p.pm.options.set('iconImageHref', getSvg(COLORS[p.color].hex, p.id, az, false)); 
};

function updPI(p) { 
    const pts = p.line.geometry.getCoordinates(); if(!pts.length) return;
    const last = pts[pts.length-1], prev = pts[pts.length-2];
    if(!p.pmEnd) { p.pmEnd = new ymaps.Placemark(last, {}, { iconLayout: 'default#imageWithContent', iconImageSize: [34,34], iconImageOffset: [-17,-17], interactive: false, zIndex: 800 }); map.geoObjects.add(p.pmEnd); }
    else p.pmEnd.geometry.setCoordinates(last);
    p.pmEnd.options.set({ iconImageHref: getSvg(COLORS[p.color].hex, p.id, prev ? calcA(prev, last) : 0, true) });
}

function recalculateIds() { points.forEach((p, i) => { p.id = i + 1; updI(p); if(p.pmEnd) updPI(p); }); }

function createPointCard(p, isSingle = false) {
    const item = Object.assign(document.createElement('div'), { className: 'sortable-point-item' });
    item.dataset.id = p.id;
    item.innerHTML = `
        ${!isSingle ? '<div class="sort-handle">☰</div>' : ''}
        <div class="item-main-row"><div class="point-number-text">${p.id}</div><div class="color-indicator-btn" style="background:${COLORS[p.color].hex}"></div><select class="cmd-select"></select></div>
        <textarea class="comm-input" rows="2" placeholder="коментарий">${p.comm || ''}</textarea>
        <div class="item-actions"><button class="btn-item-action btn-path">Путь</button><button class="btn-item-action btn-del" style="color:var(--danger)">Удалить</button></div>`;
    const sel = item.querySelector('.cmd-select');
    updateCommandOptions(sel, p.color, p.cmd);
    item.querySelector('.color-indicator-btn').onclick = e => { e.stopPropagation(); activeListPoint = { point: p, card: item }; toggleD('listColorDropdown'); };
    sel.onchange = () => p.cmd = sel.value;
    item.querySelector('.comm-input').oninput = e => p.comm = e.target.value;
    item.querySelector('.btn-del').onclick = () => { if(confirm("Удалить?")) { delPoint(p); if(isSingle) toggleM('pointsOrderModal'); else openPointsOrderModal(); } };
    item.querySelector('.btn-path').onclick = () => { toggleM('pointsOrderModal'); startEditPath(p); };
    return item;
}

function delPoint(p) { points = points.filter(x => x !== p); map.geoObjects.remove(p.pm); map.geoObjects.remove(p.line); if(p.pmEnd) map.geoObjects.remove(p.pmEnd); recalculateIds(); }

function startEditPath(p) { cur = p; isDrawing = true; $('addText').textContent = "Завершить"; $('addMarkerBtn').classList.add('drawing'); p.pm.options.set('draggable', true); p.line.editor.startEditing(); }

function openPointsOrderModal() {
    const list = $('pointsSortList'); list.innerHTML = '';
    points.forEach(p => list.appendChild(createPointCard(p)));
    $('orderModalTitle').textContent = `Маршрут (${points.length})`;
    toggleM('pointsOrderModal');
}

function openEditPointModal(p) {
    const list = $('pointsSortList'); list.innerHTML = '';
    list.appendChild(createPointCard(p, true));
    $('orderModalTitle').textContent = `Точка ${p.id}`;
    toggleM('pointsOrderModal');
}

function reorderPointsFromList() {
    const ids = Array.from($('pointsSortList').children).map(c => parseInt(c.dataset.id));
    points = ids.map(id => points.find(x => x.id === id));
    recalculateIds();
}

const handleModalSave = async () => {
    if(!curFile) return;
    const btn = $('saveInListBtn'); btn.classList.add('loading');
    const data = points.map(p => ({ id: p.id, color: p.color, cmd: p.cmd, comm: p.comm, pts: p.pts }));
    const r = await api(`https://api.github.com/gists/${userGistId}`, 'PATCH', { files: { [curFile]: { content: JSON.stringify(data) } } });
    btn.classList.remove('loading');
    if(r) { btn.classList.add('saved'); setTimeout(() => btn.classList.remove('saved'), 1500); showToast("Сохранено"); }
};

const openSettingsModal = () => { refreshFileList(); toggleM('settingsModal'); };
</script>
</body>
</html>
